  <style>
    :root {
      --bg1: #f7f3ff;
      --bg2: #efe7ff;
      --card: #ffffff;
      --text: #1f1b2d;
      --muted: #6f6688;
      --line: #e6dcff;
      --accent: #7c4dff;
      --accent2: #a98bff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(169, 139, 255, 0.22), transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, #faf8ff 50%, var(--bg2) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(230,220,255,0.9);
      border-radius: 28px;
      box-shadow: 0 18px 60px rgba(84, 54, 156, 0.12);
      padding: 40px 28px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: #f1eaff;
      color: #6547b8;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .point {
      color: var(--accent);
    }

    .code-box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      background: #faf8ff;
      border-radius: 20px;
      max-width: 560px;
      margin: 0 auto 20px;
    }

    .label {
      flex: 0 0 110px;
      text-align: left;
      color: var(--muted);
      font-size: 15px;
      padding-left: 8px;
    }

    .code {
      flex: 1;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .copy-btn {
      border: 0;
      cursor: pointer;
      border-radius: 16px;
      padding: 16px 22px;
      min-width: 120px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 10px 24px rgba(124, 77, 255, 0.25);
    }

    .copy-btn:hover {
      transform: translateY(-1px);
    }

    .desc {
      margin: 0 auto 28px;
      max-width: 520px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 14px 22px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      box-shadow: 0 10px 24px rgba(124, 77, 255, 0.22);
    }

    .secondary {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .notice {
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px dashed var(--line);
      color: #8c84a3;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 18px;
        border-radius: 24px;
      }

      .code-box {
        flex-direction: column;
        align-items: stretch;
      }

      .label {
        flex: auto;
        text-align: center;
        padding-left: 0;
      }

      .code {
        font-size: 26px;
      }

      .copy-btn {
        width: 100%;
      }
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "SSF 추천인 코드 Goodcode",
    "url": "https://ssf-recommendation-code-goodcode.vercel.app/",
    "description": "SSF 추천인 코드 Goodcode 입력 방법을 간단하게 정리한 안내 페이지입니다."
  }
  </script>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="badge">SSF 추천인</div>
      <h1>SSF 추천인 코드<br><span class="point">Goodcode</span></h1>

      <div class="code-box">
        <div class="label">추천인 코드</div>
        <div class="code" id="refCode">Goodcode</div>
        <button class="copy-btn" onclick="copyCode()">복사하기</button>
      </div>

      <p class="desc">
        SSF 추천인 코드를 찾고 있다면 아래 코드를 그대로 복사해 입력하면 됩니다.
      </p>

      <div class="actions">
        <a class="link-btn primary" href="https://www.ssfshop.com/" target="_blank" rel="noopener noreferrer">SSF 바로가기</a>
        <a class="link-btn secondary" href="https://ssf-recommendation-code-goodcode.vercel.app/">이 페이지 공유</a>
      </div>

      <div class="notice">
        안내용 정리 페이지입니다.
      </div>
    </section>
  </main>

  <script>
    function copyCode() {
      const code = document.getElementById("refCode").innerText.trim();
      navigator.clipboard.writeText(code).then(function() {
        const btn = document.querySelector(".copy-btn");
        const original = btn.textContent;
        btn.textContent = "복사 완료";
        setTimeout(function() {
          btn.textContent = original;
        }, 1500);
      });
    }
  </script>
</body>
</html>
