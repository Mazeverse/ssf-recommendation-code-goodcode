<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="google-site-verification" content="BtBII3918J1J9BnNiNfjVaPn0QXfIj5xoi1G_8qtFk4" />
  <meta name="naver-site-verification" content="155964a4ce366d1b7c49e242d5f7f8526a3286e9" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSF 추천인 코드 Goodcode | 특별 혜택 안내</title>
  <meta name="description" content="SSF 추천인 코드 Goodcode 입력 방법을 간단하게 정리한 안내 페이지입니다. 코드를 복사하고 혜택을 확인하세요." />
  <meta name="keywords" content="SSF 추천인, SSF 추천인 코드, Goodcode, 삼성물산 패션몰" />
  
  <!-- SEO & Open Graph -->
  <link rel="canonical" href="https://ssf-recommendation-code-goodcode.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="SSF 추천인 코드: Goodcode" />
  <meta property="og:description" content="복사 한 번으로 완료하는 SSF 추천인 등록" />
  <meta property="og:url" content="https://ssf-recommendation-code-goodcode.vercel.app/" />
  
  <!-- Fonts -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #e0e7ff 100%);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.4);
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Pretendard", -apple-system, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* 배경 장식 요소 */
    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      filter: blur(80px);
      border-radius: 50%;
      z-index: -1;
      opacity: 0.4;
      animation: move 10s infinite alternate;
    }

    @keyframes move {
      from { transform: translate(-10%, -10%); }
      to { transform: translate(10%, 10%); }
    }

    .container {
      width: 100%;
      max-width: 480px;
      perspective: 1000px;
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 48px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      background: white;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 24px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 40px;
    }

    /* 코드 박스 디자인 */
    .code-container {
      background: white;
      border-radius: 24px;
      padding: 8px;
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      border: 1px solid #e2e8f0;
      transition: all 0.3s ease;
    }

    .code-container:hover {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .code-value {
      flex: 1;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 1px;
      padding-left: 16px;
    }

    .copy-button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-button:hover {
      background: var(--primary-hover);
      transform: scale(1.02);
    }

    .copy-button:active {
      transform: scale(0.98);
    }

    /* 메인 액션 버튼 */
    .cta-button {
      display: block;
      width: 100%;
      padding: 18px;
      background: var(--text-main);
      color: white;
      text-decoration: none;
      border-radius: 20px;
      font-weight: 700;
      font-size: 17px;
      transition: all 0.3s;
      margin-bottom: 24px;
    }

    .cta-button:hover {
      background: #000;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .footer-text {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* 토스트 알림 */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="blob"></div>
  
  <div class="container">
    <main class="card">
      <div class="badge">✨ 신규 가입 혜택</div>
      <h1>SSF 추천인 코드<br><span style="color: var(--primary)">Goodcode</span></h1>
      <p class="subtitle">가입 시 입력하고 즉시 혜택을 받으세요</p>

      <div class="code-container">
        <div class="code-value" id="refCode">Goodcode</div>
        <button class="copy-button" onclick="copyCode()">복사하기</button>
      </div>

      <a href="https://www.ssfshop.com/" target="_blank" rel="noopener noreferrer" class="cta-button">
        SSF 공식몰 바로가기
      </a>

      <p class="footer-text">
        본 페이지는 추천인 코드 안내를 위해 제작되었습니다.<br>
        코드를 복사한 후 SSF 가입 페이지에 붙여넣어 주세요.
      </p>
    </main>
  </div>

  <div id="toast">코드가 복사되었습니다!</div>

  <script>
    function copyCode() {
      const code = document.getElementById("refCode").innerText.trim();
      navigator.clipboard.writeText(code).then(function() {
        const toast = document.getElementById("toast");
        toast.classList.add("show");
        
        const btn = document.querySelector(".copy-button");
        btn.innerText = "완료!";
        btn.style.background = "#10b981";

        setTimeout(function() {
          toast.classList.remove("show");
          btn.innerText = "복사하기";
          btn.style.background = "";
        }, 2000);
      });
    }
  </script>
</body>
</html>
